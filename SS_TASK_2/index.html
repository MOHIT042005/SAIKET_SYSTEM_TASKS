<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Landing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">GrabIt</a>

        <button class="btn btn-light" id="toggleMode">🌙</button>
    </div>
</nav>

<!-- HERO -->
<section class="hero text-center text-white d-flex align-items-center">
    <div class="container">
        <h1>Welcome to GrabIt</h1>
        <p>Best Deals Everyday</p>
        <button class="btn btn-warning">Shop Now</button>
    </div>
</section>

<!-- PRODUCTS -->
<section class="container my-5">
    <h2 class="text-center mb-4">Products</h2>

    <div class="row">

        <!-- Product 1 -->
        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Product 1</h5>
                    <p>$10</p>
                    <button class="btn btn-primary addCart">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Product 2</h5>
                    <p>$20</p>
                    <button class="btn btn-primary addCart">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Product 3</h5>
                    <p>$30</p>
                    <button class="btn btn-primary addCart">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- CONTACT FORM -->
<section class="container my-5">
    <h2 class="text-center mb-4">Contact Us</h2>

    <form id="contactForm">

        <div class="mb-3">
            <input type="text" id="name" class="form-control" placeholder="Your Name">
        </div>

        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Your Email">
        </div>

        <div class="mb-3">
            <textarea id="message" class="form-control" placeholder="Your Message"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Submit</button>

        <p id="errorMsg" class="text-danger mt-2"></p>
        <p id="successMsg" class="text-success mt-2"></p>

    </form>
</section>


<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
    © 2026 GrabIt
</footer>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
